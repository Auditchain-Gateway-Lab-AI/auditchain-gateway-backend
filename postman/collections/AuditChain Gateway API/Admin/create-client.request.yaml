$kind: http-request
method: POST
url: '{{baseUrl}}/api/admin/clients'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "company_name": "PT Karya Bangsa",
      "subscription_tier": "enterprise",
      "rate_limit_per_sec": 100,
      "status": "active",
      "actor_field": "app_user",
      "fallback_actor_field": "db_user",
      "action_field": "operasi",
      "resource_field": "tabel"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const data = pm.response.json();
      if (data.client_id) {
        pm.collectionVariables.set('clientId', data.client_id);
      }
      if (data.api_key) {
        pm.collectionVariables.set('apiKey', data.api_key);
      }
