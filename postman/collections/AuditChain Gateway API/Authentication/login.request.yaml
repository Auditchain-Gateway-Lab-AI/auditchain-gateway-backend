$kind: http-request
method: POST
url: '{{baseUrl}}/api/auth/login'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "auditor_senior",
      "password": "rahasia1234"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const data = pm.response.json();
      if (data.token) {
        pm.collectionVariables.set('bearerToken', data.token);
      }
